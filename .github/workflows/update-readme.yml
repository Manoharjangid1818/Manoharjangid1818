name: Update README with Latest Repositories

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      - name: Update README with latest repositories
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            const username = "Manoharjangid1818";
            const readmePath = "README.md";

            const { data: repos } = await github.rest.repos.listForUser({
              username,
              sort: "updated",
              direction: "desc",
              per_page: 10
            });

            const filteredRepos = repos.filter(repo =>
              !repo.fork &&
              repo.name.toLowerCase() !== username.toLowerCase()
            );

            const repoRows = filteredRepos.map(repo => {
              const description = repo.description || "No description added yet.";
              const language = repo.language ? `\`${repo.language}\`` : "Not specified";
              const stars = `⭐ ${repo.stargazers_count}`;
              const updatedDate = new Date(repo.updated_at).toLocaleDateString("en-IN", {
                year: "numeric",
                month: "short",
                day: "numeric"
              });

              return `| [**${repo.name}**](${repo.html_url}) | ${description} | ${language} | ${stars} | ${updatedDate} |`;
            }).join("\n");

            const newSection = [
              "| Repo | Description | Tech | Stars | Last Updated |",
              "|---|---|---|---|---|",
              repoRows
            ].join("\n");

            let readme = fs.readFileSync(readmePath, "utf8");

            const startMarker = "<!-- AUTO-REPOS:START -->";
            const endMarker = "<!-- AUTO-REPOS:END -->";

            const regex = new RegExp(`${startMarker}[\\s\\S]*${endMarker}`);

            if (!regex.test(readme)) {
              throw new Error("AUTO-REPOS markers not found in README.md");
            }

            readme = readme.replace(
              regex,
              `${startMarker}\n${newSection}\n${endMarker}`
            );

            fs.writeFileSync(readmePath, readme);

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update README with latest repositories"
          file_pattern: README.md
